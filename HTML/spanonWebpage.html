<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW tablespan</title>
</head>
<body>
    <table border="2" style="width: 100px; color: blueviolet;">
        <tr>
            <td colspan="3">Amazon Destination</td>
        </tr>
        <tr>
            <td>Home</td>
            <td>About</td>
            <td>Contact</td>
        </tr>
        <tr>
            <td rowspan="3" colspan="1.5">Gallery</td>
            <td rowspan="3" colspan="1.5">Add</td>
        </tr>
        <tr></tr>
        <tr></tr>
        <tr>
            <td>Home</td>
            <td>About</td>
            <td>Contact</td>
        </tr>
        <tr>
            <td colspan="3">Amazon Destination</td>
        </tr>
    </table>
</body>
</html>
