<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
</head>
<body>
    <form autocomplete="on">
    <fieldset><legend>Feed Back</legend>
    <label for="review">Name:</label>
    <input placeholder="Enter your name...." type="text" id="name" name="name"><br><br>
    <label>Email:</label>
    <input placeholder="Enter your email..." type="email" id="email" name="email"><br><br>
    <label>Ph no:</label>
    <input placeholder="Enter your mobile number..." type="tel" id="mobile" name="mobile"><br><br>
    <label>Review:</label><br>
    <textarea placeholder="Type your review......" type="comment" col="19" row="15" id="review" name="review"></textarea><br><br>
    </fieldset>
    </form>
</body>
</html>
