<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box sizing</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        h1{
            text-shadow: 2px 2px 5px red;
        }
        .nb{
            width: 100px;
            height: 100px;
            background-color: lightblue;
            border: 20px solid black;
            padding: 10px; 
            margin: 30px;
             
        }
            .cb{
                width: 100px;
                height: 100px;
                background-color: lightblue;
                border: 20px solid black;
                padding: 10px; 
                margin: 30px; 
                box-sizing: content-box;
            }
            .bb{
                width: 100px;
                height: 100px;
                background-color: lightblue;
                border: 20px solid black;
                padding: 10px; 
                margin: 30px; 
                box-sizing: border-box;
            }
    </style>
</head>
<body>
    <h1>Box sizing</h1>
    <div class="nb">Normal Box</div>
    <div class="cb">Content Box</div>
    <div class="bb">Border</div> Box</div>
</body>
</html>
